#!/usr/bin/env bash
# nightshift.conf — Configuration for the Nightshift detective system.
# Sourced by nightshift.sh and its libraries. Every tunable parameter lives here.
# Secrets/endpoints may be overridden by the environment or ~/.nightshift-env.
# Secret-bearing vars belong in ~/.nightshift-env and are refreshed from Key Vault
# by scripts/nightshift/refresh-secrets.sh:
#   - ANTHROPIC_API_KEY from secret Opus45Key
#   - AZURE_OPENAI_API_KEY from secret gpt54
#   - NIGHTSHIFT_DB_PASSWORD from secret postgres-password
# The VM should keep CLAUDE_CODE_USE_FOUNDRY unset and source ~/.nightshift-env
# for secret values plus non-secret Night Shift connection settings.
# Safety-critical tunables below are conf-authoritative and must be changed here.
# No executable logic — only variable assignments.

# ── PATH Augmentation ────────────────────────────────────────────────────────
# Ensure Homebrew binaries (claude, codex) are reachable in non-interactive
# shells (e.g. cron).  Harmless if the directory is already in PATH.
[[ ":$PATH:" != *":/opt/homebrew/bin:"* ]] && export PATH="/opt/homebrew/bin:$PATH"

# ── Agent Models ──────────────────────────────────────────────────────────────
NIGHTSHIFT_CLAUDE_MODEL="${NIGHTSHIFT_CLAUDE_MODEL:-claude-opus-4-6}"
NIGHTSHIFT_MANAGER_MODEL="${NIGHTSHIFT_MANAGER_MODEL:-claude-opus-4-6}"
NIGHTSHIFT_CODEX_MODEL="${NIGHTSHIFT_CODEX_MODEL:-azure54}"  # default Azure Codex profile

# ── Cost Controls ─────────────────────────────────────────────────────────────
NIGHTSHIFT_COST_CAP_USD="200"        # hard stop for entire run
NIGHTSHIFT_PER_CALL_CAP_USD="25"     # warning threshold per call
NIGHTSHIFT_RUNAWAY_THRESHOLD_USD="15"
NIGHTSHIFT_RUNAWAY_CONSECUTIVE="3"

# ── Investigation Scope ───────────────────────────────────────────────────────
NIGHTSHIFT_COMMIT_WINDOW_DAYS="${NIGHTSHIFT_COMMIT_WINDOW_DAYS:-7}"
NIGHTSHIFT_CONVERSATION_WINDOW_DAYS="${NIGHTSHIFT_CONVERSATION_WINDOW_DAYS:-3}"
NIGHTSHIFT_MAX_CONVERSATIONS="${NIGHTSHIFT_MAX_CONVERSATIONS:-50}"
NIGHTSHIFT_RCFA_WINDOW_DAYS="${NIGHTSHIFT_RCFA_WINDOW_DAYS:-30}"
NIGHTSHIFT_MAX_FINDINGS_PER_DETECTIVE="${NIGHTSHIFT_MAX_FINDINGS_PER_DETECTIVE:-10}"
NIGHTSHIFT_MAX_TASK_FILES="${NIGHTSHIFT_MAX_TASK_FILES:-15}"

# ── Lauren Loop Bridge ─────────────────────────────────────────────────────────
NIGHTSHIFT_BRIDGE_ENABLED="${NIGHTSHIFT_BRIDGE_ENABLED:-false}"
NIGHTSHIFT_BRIDGE_MIN_SEVERITY="${NIGHTSHIFT_BRIDGE_MIN_SEVERITY:-major}"
NIGHTSHIFT_BRIDGE_AUTO_EXECUTE="${NIGHTSHIFT_BRIDGE_AUTO_EXECUTE:-false}"
NIGHTSHIFT_BRIDGE_MAX_TASKS="${NIGHTSHIFT_BRIDGE_MAX_TASKS:-3}"
NIGHTSHIFT_BRIDGE_MAX_COST_PER_TASK="${NIGHTSHIFT_BRIDGE_MAX_COST_PER_TASK:-25}"
NIGHTSHIFT_BACKLOG_ENABLED="${NIGHTSHIFT_BACKLOG_ENABLED:-false}"
NIGHTSHIFT_BACKLOG_MAX_TASKS="${NIGHTSHIFT_BACKLOG_MAX_TASKS:-3}"
NIGHTSHIFT_BACKLOG_MIN_BUDGET="${NIGHTSHIFT_BACKLOG_MIN_BUDGET:-20}"

# ── Task Writing ───────────────────────────────────────────────────────────────
# These knobs control task creation independently from autofix. If not set,
# task writing falls back to the matching autofix value for backward compatibility.
NIGHTSHIFT_TASK_WRITER_MAX_TASKS="${NIGHTSHIFT_TASK_WRITER_MAX_TASKS:-${NIGHTSHIFT_AUTOFIX_MAX_TASKS:-5}}"
NIGHTSHIFT_TASK_WRITER_MIN_SEVERITY="${NIGHTSHIFT_TASK_WRITER_MIN_SEVERITY:-${NIGHTSHIFT_AUTOFIX_SEVERITY:-critical,major}}"
NIGHTSHIFT_TASK_WRITER_MIN_BUDGET="${NIGHTSHIFT_TASK_WRITER_MIN_BUDGET:-${NIGHTSHIFT_AUTOFIX_MIN_BUDGET:-20}}"

# ── Autofix Follow-Up ─────────────────────────────────────────────────────────
NIGHTSHIFT_AUTOFIX_ENABLED="${NIGHTSHIFT_AUTOFIX_ENABLED:-false}"
NIGHTSHIFT_AUTOFIX_MAX_TASKS="${NIGHTSHIFT_AUTOFIX_MAX_TASKS:-5}"
NIGHTSHIFT_AUTOFIX_MIN_BUDGET="${NIGHTSHIFT_AUTOFIX_MIN_BUDGET:-20}"
NIGHTSHIFT_AUTOFIX_SEVERITY="${NIGHTSHIFT_AUTOFIX_SEVERITY:-critical,major}"

# ── Timeouts ──────────────────────────────────────────────────────────────────
NIGHTSHIFT_AGENT_TIMEOUT_SECONDS="1800"
NIGHTSHIFT_TOTAL_TIMEOUT_SECONDS="7200"
NIGHTSHIFT_MAX_TURNS="${NIGHTSHIFT_MAX_TURNS:-25}"

# ── Runtime Safety ────────────────────────────────────────────────────────────
NIGHTSHIFT_MIN_FREE_MB="1024"

# ── Paths ─────────────────────────────────────────────────────────────────────
# NIGHTSHIFT_DIR resolves from this file's location so it works when sourced
# from any directory.
NIGHTSHIFT_DIR="${NIGHTSHIFT_DIR:-$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)}"
NIGHTSHIFT_REPO_DIR="${NIGHTSHIFT_REPO_DIR:-$(cd "$NIGHTSHIFT_DIR/../.." && pwd)}"
NIGHTSHIFT_LOG_DIR="${NIGHTSHIFT_LOG_DIR:-$NIGHTSHIFT_DIR/logs}"
NIGHTSHIFT_FINDINGS_DIR="${NIGHTSHIFT_FINDINGS_DIR:-/tmp/nightshift-findings}"
NIGHTSHIFT_RENDERED_DIR="${NIGHTSHIFT_RENDERED_DIR:-/tmp/nightshift-rendered}"
NIGHTSHIFT_PLAYBOOKS_DIR="${NIGHTSHIFT_PLAYBOOKS_DIR:-$NIGHTSHIFT_DIR/playbooks}"
NIGHTSHIFT_COST_STATE_FILE="${NIGHTSHIFT_COST_STATE_FILE:-/tmp/nightshift-cost-state.json}"
NIGHTSHIFT_COST_CSV="${NIGHTSHIFT_COST_CSV:-$NIGHTSHIFT_LOG_DIR/cost-history.csv}"

# ── Database Safety ──────────────────────────────────────────────────────────
NIGHTSHIFT_DB_ADMIN_USER="${NIGHTSHIFT_DB_ADMIN_USER:-admin}"
NIGHTSHIFT_DB_CONNECT_TIMEOUT="${NIGHTSHIFT_DB_CONNECT_TIMEOUT:-10}"
NIGHTSHIFT_DB_SSLMODE="${NIGHTSHIFT_DB_SSLMODE:-require}"

# ── Git ───────────────────────────────────────────────────────────────────────
NIGHTSHIFT_BASE_BRANCH="${NIGHTSHIFT_BASE_BRANCH:-main}"
NIGHTSHIFT_PR_LABELS="${NIGHTSHIFT_PR_LABELS:-nightshift,auto-generated}"
NIGHTSHIFT_MAX_PR_FILES="20"
NIGHTSHIFT_MAX_PR_LINES="5000"
NIGHTSHIFT_PROTECTED_BRANCHES="main,development,master"

# ── Notifications ─────────────────────────────────────────────────────────────
NIGHTSHIFT_WEBHOOK_URL="${NIGHTSHIFT_WEBHOOK_URL:-}"
NIGHTSHIFT_NOTIFY_EMAIL="${NIGHTSHIFT_NOTIFY_EMAIL:-}"

# ── Pricing (USD per 1 million tokens) ────────────────────────────────────────
# Claude Sonnet 4.6
NIGHTSHIFT_CLAUDE_SONNET_INPUT_PRICE="${NIGHTSHIFT_CLAUDE_SONNET_INPUT_PRICE:-3.00}"
NIGHTSHIFT_CLAUDE_SONNET_OUTPUT_PRICE="${NIGHTSHIFT_CLAUDE_SONNET_OUTPUT_PRICE:-15.00}"
NIGHTSHIFT_CLAUDE_SONNET_CACHE_WRITE_PRICE="${NIGHTSHIFT_CLAUDE_SONNET_CACHE_WRITE_PRICE:-3.75}"
NIGHTSHIFT_CLAUDE_SONNET_CACHE_READ_PRICE="${NIGHTSHIFT_CLAUDE_SONNET_CACHE_READ_PRICE:-0.30}"

# Claude Opus 4.6
NIGHTSHIFT_CLAUDE_OPUS_INPUT_PRICE="${NIGHTSHIFT_CLAUDE_OPUS_INPUT_PRICE:-15.00}"
NIGHTSHIFT_CLAUDE_OPUS_OUTPUT_PRICE="${NIGHTSHIFT_CLAUDE_OPUS_OUTPUT_PRICE:-75.00}"
NIGHTSHIFT_CLAUDE_OPUS_CACHE_WRITE_PRICE="${NIGHTSHIFT_CLAUDE_OPUS_CACHE_WRITE_PRICE:-18.75}"
NIGHTSHIFT_CLAUDE_OPUS_CACHE_READ_PRICE="${NIGHTSHIFT_CLAUDE_OPUS_CACHE_READ_PRICE:-1.50}"

# Codex / OpenAI (if ever enabled)
NIGHTSHIFT_CODEX_INPUT_PRICE="${NIGHTSHIFT_CODEX_INPUT_PRICE:-2.00}"
NIGHTSHIFT_CODEX_OUTPUT_PRICE="${NIGHTSHIFT_CODEX_OUTPUT_PRICE:-8.00}"
